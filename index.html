<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Form V2</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Background Circles -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>

    <!-- Main Container -->
    <div class="main-container">

        <!-- Left Panel -->
        <div class="left-panel">

            <div class="logo">
                <i class="fa-solid fa-user-plus"></i>
            </div>

            <h1>Create Your Account</h1>

            <p>
                Join our learning community and start your coding journey with us.
            </p>

            <div class="features">

                <div class="feature">
                    <i class="fa-solid fa-circle-check"></i>
                    <span>Modern Design</span>
                </div>

                <div class="feature">
                    <i class="fa-solid fa-circle-check"></i>
                    <span>Secure Registration</span>
                </div>

                <div class="feature">
                    <i class="fa-solid fa-circle-check"></i>
                    <span>Responsive Layout</span>
                </div>

                <div class="feature">
                    <i class="fa-solid fa-circle-check"></i>
                    <span>Easy to Use</span>
                </div>

            </div>

        </div>

        <!-- Right Panel -->
        <div class="right-panel">

            <h2>Registration Form</h2>

            <p class="subtitle">
                Fill in your details below.
            </p>

            <form id="registrationForm">

                <!-- Full Name -->
                <label for="fullname">
                    Full Name <span class="required">*</span>
                </label>

                <div class="input-box">
                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="fullname"
                        name="fullname"
                        placeholder="Enter your full name"
                        pattern="[A-Za-z ]+"
                        title="Only letters and spaces are allowed"
                        required>
                </div>

                <!-- Email -->
                <label for="email">
                    Email Address <span class="required">*</span>
                </label>

                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <!-- Mobile -->
                <label for="mobile">
                    Mobile Number <span class="required">*</span>
                </label>

                <div class="input-box">
                    <i class="fa-solid fa-phone"></i>

                    <input
                        type="tel"
                        id="mobile"
                        name="mobile"
                        placeholder="Enter your mobile number"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        title="Enter a valid 10-digit mobile number"
                        required>
                </div>

                <!-- Password -->
                <label for="password">
                    Password <span class="required">*</span>
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create password"
                        minlength="6"
                        required>

                    <i class="fa-solid fa-eye toggle-password"
                        onclick="togglePassword('password',this)">
                    </i>

                </div>

                <div id="passwordStrength" class="strength-text"></div>


                                <!-- Confirm Password -->
                <label for="confirmPassword">
                    Confirm Password <span class="required">*</span>
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-key"></i>

                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Confirm your password"
                        minlength="6"
                        required>

                    <i class="fa-solid fa-eye toggle-password"
                        onclick="togglePassword('confirmPassword',this)">
                    </i>

                </div>
                
                <p id="matchMessage" class="match-text"></p>


                <!-- Gender -->
                <label>
                    Gender <span class="required">*</span>
                </label>

                <div class="gender">

                    <label>
                        <input type="radio" name="gender" value="Male" required>
                        Male
                    </label>

                    <label>
                        <input type="radio" name="gender" value="Female">
                        Female
                    </label>

                    <label>
                        <input type="radio" name="gender" value="Other">
                        Other
                    </label>

                </div>

                <!-- Course -->
                <label for="course">
                    Course <span class="required">*</span>
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-graduation-cap"></i>

                    <select id="course" name="course" required>

                        <option value="">Select Course</option>

                        <option>HTML</option>
                        <option>CSS</option>
                        <option>JavaScript</option>
                        <option>Python</option>
                        <option>Java</option>
                        <option>C++</option>
                        
                    </select>

                </div>

                <!-- Address -->
                <label for="address">
                    Address <span class="required">*</span>
                </label>

                <div class="input-box textarea-box">

                    <i class="fa-solid fa-location-dot"></i>

                    <textarea
                        id="address"
                        name="address"
                        rows="4"
                        placeholder="Enter your address"
                        required></textarea>

                </div>

                <!-- Terms -->
                <div class="terms">

                    <input
                        type="checkbox"
                        id="terms"
                        required>

                    <label for="terms">
                        I agree to the
                        <a href="#">Terms & Conditions</a>
                    </label>

                </div>

                <!-- Buttons -->
                <div class="button-group">

                    <button type="submit" class="register-btn">
                        <i class="fa-solid fa-user-plus"></i>
                        Register Now
                    </button>

                    <button type="reset" class="reset-btn">
                        <i class="fa-solid fa-rotate-left"></i>
                        Reset
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- Success Popup -->

    <div id="successPopup" class="popup">

        <div class="popup-content">

            <div class="success-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>

            <h2>Registration Successful!</h2>

            <p>
                Your account has been created successfully.
            </p>

            <button onclick="closePopup()">
                OK
            </button>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
